<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥事測驗系統 - 羅東博愛醫院</title>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --brand-color: #d35400; 
            --accent-blue: #3498db;
            --success-green: #27ae60;
            --text-dark: #1e293b;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--primary-bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        .record-panel {
            width: 100%; max-width: 550px; background: #334155; color: white;
            padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex;
            justify-content: space-around; font-size: 0.8rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .record-item { text-align: center; flex: 1; border-right: 1px solid #475569; }
        .record-item:last-child { border-right: none; }
        .record-val { display: block; font-size: 1.1rem; font-weight: bold; color: #facc15; margin-top: 4px; }

        .container { 
            background: var(--card-bg); padding: 2.2rem; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; 
            box-sizing: border-box;
        }
        .brand-ch-fixed { font-size: 2.4rem; font-weight: 800; color: var(--brand-color); margin-bottom: 5px; word-break: break-all; }
        
        /* 單元選擇樣式 */
        #category-view select {
            width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0;
            font-size: 1.1rem; margin: 20px 0; outline: none;
        }

        .quiz-area { background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 6px solid var(--accent-blue); }
        .q-text { font-size: 1.55rem; font-weight: bold; color: var(--text-dark); word-break: break-all; }
        
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 1.5rem; text-align: left; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1.15rem; box-sizing: border-box; text-align: center; outline: none; transition: all 0.2s; }
        input[type="text"]:focus { border-color: var(--accent-blue); }
        input[type="text"]:disabled { background-color: #f8fafc; color: #64748b; }
        
        button { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; outline: none; }
        .btn-check { background: var(--accent-blue); color: white; margin-top: 10px; }
        .btn-next { background: var(--success-green); color: white; display: none; margin-top: 10px; }
        .btn-start { background: var(--brand-color); color: white; }

        .result-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 12px; display: none; text-align: left; line-height: 1.6; }
        .result-correct { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .result-wrong { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .footer-info { margin-top: 25px; font-size: 0.75rem; color: #94a3b8; }
        .btn-reset { background: none; border: 1px solid #cbd5e1; color: #94a3b8; padding: 6px 12px; width: auto; font-size: 0.75rem; margin-top: 15px; border-radius: 6px; cursor: pointer; }
        .btn-back { background: none; color: var(--accent-blue); font-size: 0.85rem; text-decoration: underline; margin-top: 10px; display: inline-block; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div class="record-panel">
        <div class="record-item">累積測驗<span class="record-val" id="total-count">0</span></div>
        <div class="record-item">本次分數<span class="record-val" id="current-score" style="color: #60a5fa;">0</span></div>
        <div class="record-item">最高連勝<span class="record-val" id="best-streak">0</span></div>
        <div class="record-item">最高得分<span class="record-val" id="best-score">0</span></div>
    </div>

    <div class="container">
        <div id="loading-view">🔄 同步博愛藥譜中...</div>

        <div id="category-view" style="display:none;">
            <h2 style="color: var(--text-dark);">請選擇測驗單元</h2>
            <select id="category-select">
                <option value="ALL">--- 全部單元 ---</option>
            </select>
            <button class="btn-start" onclick="startQuiz()">開始挑戰</button>
        </div>

        <div id="quiz-view" style="display:none;">
            <div class="brand-ch-fixed" id="display-ch">---</div>
            <div id="display-cat" style="font-size:0.85rem; color:#64748b; margin-bottom:15px;">單元分類</div>

            <div class="quiz-area">
                <div id="q-label" style="font-size:0.75rem; color:#94a3b8; margin-bottom:8px;">題目類型</div>
                <div class="q-text" id="display-q-text">---</div>
            </div>
            
            <div id="input-container" class="input-group"></div>
            
            <button id="btn-check" class="btn-check" onclick="handleCheck()">提交答案</button>
            <button id="btn-next" class="btn-next" onclick="handleNext()">下一題 (Enter)</button>
            
            <div id="result-box" class="result-box"></div>
            <button class="btn-back" onclick="backToMenu()">← 返回選單重選</button>
        </div>

        <button class="btn-reset" onclick="resetUserRecords()">重置個人紀錄</button>
        <div class="footer-info" id="sync-status">載入中...</div>
    </div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzelo5rvBFoyWT3tRPd-Jqh_7JuWv4pV4sQ0huBJAYD5zjU70wobFSvPReyg0kNnWJW/exec';

    let allDrugData = []; // 原始所有資料
    let filteredData = []; // 篩選後的資料
    let currentDrug = {}, answerKey = "";
    
    let rawData = JSON.parse(localStorage.getItem('pharmacist_records')) || {};
    let userStats = {
        total_count: parseInt(rawData.total_count) || 0,
        best_score: parseInt(rawData.best_score) || 0,
        best_streak: parseInt(rawData.best_streak) || 0,
        current_score: 0,
        current_streak: 0
    };

    function updateRecordDisplay() {
        document.getElementById('total-count').innerText = userStats.total_count;
        document.getElementById('current-score').innerText = userStats.current_score;
        document.getElementById('best-streak').innerText = userStats.best_streak;
        document.getElementById('best-score').innerText = userStats.best_score;
        localStorage.setItem('pharmacist_records', JSON.stringify(userStats));
    }

    async function fetchSheetsData() {
        try {
            const res = await fetch(PROXY_URL);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(line => line.trim() !== "");
            
            // 💡 抓取 D 欄 (索引 3) 作為分類
            allDrugData = rows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                return { ch: cols[0], en: cols[1], ge: cols[2], cat: cols[3] || "未分類" };
            }).filter(item => item.ch && (item.en || item.ge));
            
            // 自動生成選單選項
            const categories = [...new Set(allDrugData.map(d => d.cat))];
            const select = document.getElementById('category-select');
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                select.appendChild(opt);
            });

            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
            document.getElementById('sync-status').innerText = `✅ 題庫同步成功 (${allDrugData.length} 筆)`;
            updateRecordDisplay();
        } catch (e) {
            document.getElementById('sync-status').innerText = "❌ 資料載入失敗";
        }
    }

    function startQuiz() {
        const selectedCat = document.getElementById('category-select').value;
        if (selectedCat === "ALL") {
            filteredData = allDrugData;
        } else {
            filteredData = allDrugData.filter(d => d.cat === selectedCat);
        }

        if (filteredData.length === 0) return alert("該分類下沒有題目！");

        document.getElementById('category-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'block';
        handleNext();
    }

    function backToMenu() {
        if(confirm("返回選單將會結束本次測驗，確定嗎？")) {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
            userStats.current_score = 0;
            userStats.current_streak = 0;
            updateRecordDisplay();
        }
    }

    function splitAnswers(str) {
        if (!str) return [];
        return str.split(/[,，/／]/).map(s => s.trim()).filter(s => s !== "");
    }

    function handleNext() {
        document.getElementById('result-box').style.display = "none";
        document.getElementById('btn-check').style.display = "block";
        document.getElementById('btn-next').style.display = "none";

        currentDrug = filteredData[Math.floor(Math.random() * filteredData.length)];
        const isEn = Math.random() > 0.5;
        const qKey = isEn ? "en" : "ge";
        answerKey = isEn ? "ge" : "en";

        document.getElementById('display-ch').innerText = currentDrug.ch;
        document.getElementById('display-cat').innerText = `單元分類：${currentDrug.cat}`;
        document.getElementById('q-label').innerText = qKey === "en" ? "英文商品名 (Brand Name)" : "學名 (Generic Name)";
        document.getElementById('display-q-text').innerText = currentDrug[qKey] || "---";

        const container = document.getElementById('input-container');
        container.innerHTML = "";
        
        const correctParts = splitAnswers(currentDrug[answerKey]);
        correctParts.forEach((_, i) => {
            const input = document.createElement('input');
            input.type = "text";
            input.className = "answer-input";
            const placeholderType = (answerKey === 'ge') ? "學名" : "商品名";
            input.placeholder = `請輸入${placeholderType} ${correctParts.length > 1 ? (i+1) : ''}`;
            container.appendChild(input);
        });
        if (container.querySelector('input')) container.querySelector('input').focus();
    }

    function handleCheck() {
        const inputs = document.querySelectorAll('.answer-input');
        const userAnswers = Array.from(inputs).map(i => i.value.trim().toLowerCase());
        const correctAnswers = splitAnswers(currentDrug[answerKey]).map(s => s.toLowerCase());
        
        let isRight = (userAnswers.length === correctAnswers.length) && 
                      userAnswers.every(u => correctAnswers.includes(u)) &&
                      correctAnswers.every(c => userAnswers.includes(c));

        const resultBox = document.getElementById('result-box');
        resultBox.style.display = "block";
        userStats.total_count += 1;

        if (isRight) {
            userStats.current_score += 10;
            userStats.current_streak += 1;
            if(userStats.current_score > userStats.best_score) userStats.best_score = userStats.current_score;
            if(userStats.current_streak > userStats.best_streak) userStats.best_streak = userStats.current_streak;
            resultBox.className = "result-box result-correct";
            resultBox.innerHTML = "✅ <strong>答對了！</strong>";
        } else {
            userStats.current_score = 0;
            userStats.current_streak = 0;
            resultBox.className = "result-box result-wrong";
            resultBox.innerHTML = `❌ <strong>答錯，分數歸零！</strong><br>答案：<span style="font-weight:bold;">${currentDrug[answerKey]}</span>`;
        }

        updateRecordDisplay();
        inputs.forEach(i => i.disabled = true);
        document.getElementById('btn-check').style.display = "none";
        document.getElementById('btn-next').style.display = "block";
        document.getElementById('btn-next').focus();
    }

    function resetUserRecords() {
        if(confirm("重置所有紀錄？")) {
            userStats = { total_count: 0, best_score: 0, best_streak: 0, current_score: 0, current_streak: 0 };
            updateRecordDisplay();
        }
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const checkVisible = document.getElementById('btn-check').style.display !== 'none';
            const quizVisible = document.getElementById('quiz-view').style.display !== 'none';
            if (quizVisible) {
                if (checkVisible) handleCheck();
                else handleNext();
            }
        }
    });

    window.onload = fetchSheetsData;
</script>
</body>
</html>
