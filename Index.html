<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥事測驗挑戰 - 羅東博愛醫院</title>
    <style>
        :root {
            --primary-bg: #f0f4f8;
            --card-bg: #ffffff;
            --brand-color: #d35400; 
            --accent-blue: #3498db;
            --success-green: #27ae60;
            --error-red: #e74c3c;
            --text-dark: #1e293b;
            --panel-bg: #334155;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--primary-bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; color: var(--text-dark); }
        
        /* 頂部紀錄面板 */
        .record-panel {
            width: 100%; max-width: 600px; background: var(--panel-bg); color: white;
            padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex;
            justify-content: space-around; font-size: 0.85rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .record-item { text-align: center; flex: 1; border-right: 1px solid #475569; }
        .record-item:last-child { border-right: none; }
        .record-val { display: block; font-size: 1.2rem; font-weight: bold; color: #facc15; margin-top: 4px; }

        .container { 
            background: var(--card-bg); padding: 2.5rem; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; 
            box-sizing: border-box; position: relative;
        }
        
        .brand-title { font-size: 2rem; font-weight: 800; color: var(--text-dark); margin-bottom: 10px; }
        #category-view select {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0;
            font-size: 1.1rem; margin: 25px 0; outline: none; background: white; cursor: pointer;
        }

        .progress-text { font-size: 1rem; color: #64748b; margin-bottom: 15px; font-weight: bold; background: #e2e8f0; padding: 5px 15px; border-radius: 20px; display: inline-block;}
        .brand-ch-fixed { font-size: 2.6rem; font-weight: 800; color: var(--brand-color); margin-bottom: 5px; word-break: break-all; line-height: 1.2; }
        .quiz-area { background: #f8fafc; padding: 25px; border-radius: 15px; margin-bottom: 25px; border-left: 6px solid var(--accent-blue); }
        .q-text { font-size: 1.7rem; font-weight: bold; color: var(--text-dark); word-break: break-all; }
        
        .input-group { display: flex; flex-direction: column; gap: 18px; margin-bottom: 2rem; text-align: left; }
        input[type="text"] { width: 100%; padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1.2rem; box-sizing: border-box; text-align: center; outline: none; transition: all 0.2s; }
        input[type="text"]:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1); }
        input[type="text"]:disabled { background-color: #f1f5f9; color: #94a3b8; }
        
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: all 0.2s; outline: none; }
        .btn-check { background: var(--accent-blue); color: white; margin-top: 10px; }
        .btn-next { background: var(--success-green); color: white; display: none; margin-top: 10px; }
        .btn-start { background: var(--brand-color); color: white; }

        .result-box { margin-top: 1.5rem; padding: 1.2rem; border-radius: 12px; display: none; text-align: left; line-height: 1.6; }
        .result-correct { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .result-wrong { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .footer-info { margin-top: 30px; font-size: 0.8rem; color: #94a3b8; }
        .btn-reset { background: none; border: 1px solid #cbd5e1; color: #94a3b8; padding: 8px 15px; width: auto; font-size: 0.8rem; margin-top: 20px; border-radius: 8px; cursor: pointer; }
        .btn-back { background: none; color: #64748b; font-size: 0.9rem; text-decoration: underline; margin-top: 15px; display: inline-block; cursor: pointer; border: none; }

        /* 💡 自訂彈跳視窗樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: white; padding: 50px 60px; border-radius: 30px;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            transform: scale(0.7); transition: all 0.3s; max-width: 90%;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .encourage-text { font-size: 4.5rem; font-weight: 900; margin: 0; line-height: 1.1; }
        .streak-info { font-size: 1.3rem; color: #64748b; margin-top: 20px; font-weight: bold; }
        
        /* 彈窗配色 */
        .color-streak-5 { color: #3498db; }
        .color-streak-10 { color: #27ae60; }
        .color-streak-15 { color: #9b59b6; }
        .color-streak-20 { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .color-gameover { color: #e74c3c; }
        .color-finish { color: #2ecc71; }

        .modal-btn { background: var(--panel-bg); color: white; margin-top: 35px; width: auto; padding: 15px 40px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <p class="encourage-text" id="modal-text">不錯哦！</p>
            <p class="streak-info" id="modal-streak-info">連續答對 5 題！</p>
            <button class="modal-btn" onclick="closeModal()">繼續 (Enter)</button>
        </div>
    </div>

    <div class="record-panel">
        <div class="record-item">累積測驗<span class="record-val" id="total-count">0</span></div>
        <div class="record-item">本次分數<span class="record-val" id="current-score" style="color: #60a5fa;">0</span></div>
        <div class="record-item">最高連勝<span class="record-val" id="best-streak">0</span></div>
        <div class="record-item">最高得分<span class="record-val" id="best-score">0</span></div>
    </div>

    <div class="container">
        <div id="loading-view">🔄 同步博愛藥譜中...</div>

        <div id="category-view" style="display:none;">
            <div class="brand-title">羅東博愛醫院</div>
            <h2 style="color: var(--brand-color); margin-top: 0;">單元挑戰模式</h2>
            <p style="color:#64748b;">答錯即結束，挑戰最高 20 題！</p>
            <select id="category-select">
                <option value="ALL">--- 全部單元 ---</option>
            </select>
            <button class="btn-start" onclick="startQuiz()">開始挑戰</button>
        </div>

        <div id="quiz-view" style="display:none;">
            <div class="progress-text">第 <span id="q-count">1</span> / <span id="q-max">20</span> 題</div>
            <div class="brand-ch-fixed" id="display-ch">---</div>
            <div id="display-cat" style="font-size:0.9rem; color:#64748b; margin-bottom:20px; font-weight:bold;">單元分類</div>

            <div class="quiz-area">
                <div id="q-label" style="font-size:0.8rem; color:#94a3b8; margin-bottom:10px; font-weight:bold;">題目類型</div>
                <div class="q-text" id="display-q-text">---</div>
            </div>
            
            <div id="input-container" class="input-group"></div>
            
            <button id="btn-check" class="btn-check" onclick="handleCheck()">提交答案</button>
            <button id="btn-next" class="btn-next" onclick="handleNext()">下一題 (Enter)</button>
            
            <div id="result-box" class="result-box"></div>
            <button class="btn-back" onclick="backToMenu()">放棄挑戰返回選單</button>
        </div>

        <button class="btn-reset" onclick="resetUserRecords()">重置個人紀錄</button>
        <div class="footer-info" id="sync-status">初始化中...</div>
    </div>

<script>
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzelo5rvBFoyWT3tRPd-Jqh_7JuWv4pV4sQ0huBJAYD5zjU70wobFSvPReyg0kNnWJW/exec';

    let allDrugData = [], filteredData = [], currentDrug = {}, answerKey = "";
    let gameIndex = 0, maxQuizCount = 20, isModalOpen = false;

    let rawData = JSON.parse(localStorage.getItem('pharmacist_records')) || {};
    let userStats = {
        total_count: parseInt(rawData.total_count) || 0,
        best_score: parseInt(rawData.best_score) || 0,
        best_streak: parseInt(rawData.best_streak) || 0,
        current_score: 0,
        current_streak: 0
    };

    function updateRecordDisplay() {
        document.getElementById('total-count').innerText = userStats.total_count;
        document.getElementById('current-score').innerText = userStats.current_score;
        document.getElementById('best-streak').innerText = userStats.best_streak;
        document.getElementById('best-score').innerText = userStats.best_score;
        localStorage.setItem('pharmacist_records', JSON.stringify(userStats));
    }

    async function fetchSheetsData() {
        try {
            const res = await fetch(PROXY_URL);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(line => line.trim() !== "");
            allDrugData = rows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                return { ch: cols[0], en: cols[1], ge: cols[2], cat: cols[3] || "未分類" };
            }).filter(item => item.ch && (item.en || item.ge));
            
            const categories = [...new Set(allDrugData.map(d => d.cat))];
            const select = document.getElementById('category-select');
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.innerText = cat; select.appendChild(opt);
            });
            document.getElementById('loading-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
            document.getElementById('sync-status').innerText = `✅ 題庫同步成功 (${allDrugData.length} 筆)`;
            updateRecordDisplay();
        } catch (e) {
            document.getElementById('sync-status').innerText = "❌ 載入失敗，請檢查網路。";
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function showModal(text, subText, type) {
        isModalOpen = true;
        const overlay = document.getElementById('modal-overlay');
        const textEl = document.getElementById('modal-text');
        const infoEl = document.getElementById('modal-streak-info');
        textEl.innerText = text;
        textEl.className = 'encourage-text color-' + type;
        infoEl.innerText = subText;
        overlay.classList.add('active');
        overlay.querySelector('.modal-btn').focus();
    }

    function closeModal() {
        isModalOpen = false;
        document.getElementById('modal-overlay').classList.remove('active');
        const typeClass = document.getElementById('modal-text').className;
        if (typeClass.includes('gameover') || typeClass.includes('finish')) {
            backToMenu(true);
        } else {
            handleNext();
        }
    }

    function startQuiz() {
        const selectedCat = document.getElementById('category-select').value;
        let sourceData = (selectedCat === "ALL") ? allDrugData : allDrugData.filter(d => d.cat === selectedCat);
        if (sourceData.length === 0) return alert("沒有題目！");

        maxQuizCount = Math.min(sourceData.length, 20);
        document.getElementById('q-max').innerText = maxQuizCount;
        filteredData = shuffle([...sourceData]).slice(0, maxQuizCount);
        
        gameIndex = 0;
        userStats.current_score = 0;
        userStats.current_streak = 0;
        updateRecordDisplay();

        document.getElementById('category-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'block';
        handleNext();
    }

    function handleNext() {
        document.getElementById('q-count').innerText = gameIndex + 1;
        document.getElementById('result-box').style.display = "none";
        document.getElementById('btn-check').style.display = "block";
        document.getElementById('btn-next').style.display = "none";

        currentDrug = filteredData[gameIndex];
        const isEn = Math.random() > 0.5;
        answerKey = isEn ? "ge" : "en";

        document.getElementById('display-ch').innerText = currentDrug.ch;
        document.getElementById('display-cat').innerText = `單元：${currentDrug.cat}`;
        document.getElementById('q-label').innerText = isEn ? "英文商品名 (Brand Name)" : "學名 (Generic Name)";
        document.getElementById('display-q-text').innerText = isEn ? currentDrug.en : currentDrug.ge;

        const container = document.getElementById('input-container');
        container.innerHTML = "";
        const parts = currentDrug[answerKey].split(/[,，/／]/).map(s => s.trim()).filter(s => s !== "");
        parts.forEach((_, i) => {
            const input = document.createElement('input');
            input.type = "text"; input.className = "answer-input";
            input.placeholder = `請輸入${answerKey === 'ge' ? '學名' : '商品名'} ${parts.length > 1 ? (i+1) : ''}`;
            container.appendChild(input);
        });
        if (container.querySelector('input')) container.querySelector('input').focus();
    }

    function handleCheck() {
        const inputs = document.querySelectorAll('.answer-input');
        const userAns = Array.from(inputs).map(i => i.value.trim().toLowerCase());
        const correctAns = currentDrug[answerKey].toLowerCase().split(/[,，/／]/).map(s => s.trim()).filter(s => s !== "");
        
        let isRight = (userAns.length === correctAns.length) && userAns.every(u => correctAns.includes(u)) && correctAns.every(c => userAns.includes(c));

        if (isRight) {
            gameIndex++;
            userStats.total_count++;
            userStats.current_score += 10;
            userStats.current_streak++;
            if(userStats.current_score > userStats.best_score) userStats.best_score = userStats.current_score;
            if(userStats.current_streak > userStats.best_streak) userStats.best_streak = userStats.current_streak;
            updateRecordDisplay();

            if (gameIndex === maxQuizCount) {
                showModal("挑戰達成！", `完勝 ${maxQuizCount} 題！最終得分：${userStats.current_score}`, "finish");
                return;
            }

            if ([5, 10, 15, 20].includes(userStats.current_streak)) {
                const words = { 5: "不錯哦！", 10: "好厲害！", 15: "哇~超強的！", 20: "有神快拜！" };
                showModal(words[userStats.current_streak], `連續答對 ${userStats.current_streak} 題！`, "streak-" + userStats.current_streak);
            } else {
                document.getElementById('result-box').className = "result-box result-correct";
                document.getElementById('result-box').innerHTML = "✅ <strong>答對了！</strong>";
                document.getElementById('result-box').style.display = "block";
                document.getElementById('btn-check').style.display = "none";
                document.getElementById('btn-next').style.display = "block";
                document.getElementById('btn-next').focus();
            }
        } else {
            showModal("Game Over！", `很遺憾，在第 ${gameIndex + 1} 題失敗了。`, "gameover");
            document.getElementById('result-box').className = "result-box result-wrong";
            document.getElementById('result-box').innerHTML = `❌ <strong>答錯了！</strong><br>正確答案：<b>${currentDrug[answerKey]}</b>`;
            document.getElementById('result-box').style.display = "block";
            document.getElementById('btn-check').style.display = "none";
            updateRecordDisplay();
        }
    }

    function backToMenu(force = false) {
        if(force || confirm("確定返回選單？")) {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('category-view').style.display = 'block';
            userStats.current_score = 0;
            userStats.current_streak = 0;
            updateRecordDisplay();
        }
    }

    function resetUserRecords() {
        if(confirm("確定重置所有紀錄？")) {
            userStats = { total_count: 0, best_score: 0, best_streak: 0, current_score: 0, current_streak: 0 };
            updateRecordDisplay();
        }
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (isModalOpen) closeModal();
            else if (document.getElementById('quiz-view').style.display !== 'none') {
                if (document.getElementById('btn-check').style.display !== 'none') handleCheck();
                else if (document.getElementById('btn-next').style.display !== 'none') handleNext();
            }
        }
    });
    window.onload = fetchSheetsData;
</script>
</body>
</html>
